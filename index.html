<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto veiculo</title>

    
    <script src="js/script_veiculo.js" defer type="module"></script>
    <link rel="stylesheet" href="css/style_veiculo.css">

</head>
<body>
    <div id="geral">
        <h3>Cadastro De veiculo</h3>

        <div id="div-codigo">

            <hr>
            <h4>Requisitos Da Atividade</h4>
            <p>CADASTRO DE VEÍCULOS</p>
            <p>LISTAGEM DOS VEÍCULOS</p>
            <p>LIMPEZA DE FORMULÁRIO</p>
            <hr>


        </div>

        <div id="div-form-veiculo">
            <form id="form-veiculo">

                <label for="modelo">Modelo</label>
                <input type="text" name="modelo" id="modelo">

                <label for="marca">Marca</label>
                <input type="text" name="marca" id="marca">

                <label for="placa">Placa</label>
                <input type="text" name="placa" id="placa">

                <label for="ano">Ano</label>
                <input type="text" name="ano" id="ano">

                <label for="valor">Valor</label>
                <input type="text" name="valor" id="valor">

                <label for="combustivel">Combustivel</label>
                <input type="text" name="combustivel" id="combustivel">

                <button type="submit" id="btn-add">Adicionar</button>
                <button type="reset" id="btn-limpar">Limpar</button>

            </form>
        </div>

        <div id="div-lista">Lista</div>
    
</body>
</html>
