<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Empresa</title>

    <script src="js/script_empresa.js" defer type="module"></script>
</head>
<body>

    <h2>Cadastro de Empresas</h2>

    <div id="div-form-empresa">

        <form id="form-empresa">

            <label for="descricao">Descrição da Empresa</label>
            <input type="text" id="descricao" name="descricao" required>

            <br>
            <br>

            <label for="quantidade">Quantidade Recolhida</label>
            <input type="number" id="quantidade" name="quantidade" required>

            <br>
            <br>

            <button type="submit">Adicionar</button>
            <button type="reset" id="btn-limpar">Limpar</button>

        </form>

    </div>

    <hr>

    <div id="div-formulario"></div>

</body>
</html>
